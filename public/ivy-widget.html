<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ivy PPT Tool</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fbff;
      --soft: rgba(247, 251, 255, .82);
      --muted: rgba(226, 236, 246, .75);
      --line: rgba(255, 255, 255, .18);
      --glass: rgba(8, 18, 31, .54);
      --glass-strong: rgba(7, 16, 28, .72);
      --field: rgba(255, 255, 255, .10);
      --accent: #33d6b3;
      --blue: #6aa8ff;
      --gold: #f6c96b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(3, 8, 18, .80), rgba(6, 20, 34, .58) 46%, rgba(3, 8, 18, .84)),
        url("https://images.unsplash.com/photo-1741135742473-8b6120b4f248?auto=format&fit=crop&fm=jpg&ixlib=rb-4.1.0&q=72&w=2400") center center / cover fixed no-repeat;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 18%, rgba(51, 214, 179, .18), transparent 28%),
        radial-gradient(circle at 78% 12%, rgba(106, 168, 255, .18), transparent 30%),
        linear-gradient(180deg, rgba(2, 6, 15, .12), rgba(2, 6, 15, .58));
    }
    .shell {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      padding: 28px clamp(16px, 4vw, 34px);
    }
    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 6px 2px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: .98;
      letter-spacing: 0;
      text-shadow: 0 12px 34px rgba(0, 0, 0, .42);
    }
    .subtitle {
      margin: 10px 0 0;
      max-width: 760px;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.55;
    }
    .badge {
      border: 1px solid rgba(51, 214, 179, .42);
      color: #dbfff7;
      background: rgba(13, 83, 73, .42);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 780;
      white-space: nowrap;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(330px, .9fr) minmax(360px, 1.1fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
      backdrop-filter: blur(16px) saturate(128%);
    }
    .panel.strong { background: var(--glass-strong); }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }
    p, li {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    label {
      display: block;
      margin: 13px 0 6px;
      color: #eef8ff;
      font-size: 13px;
      font-weight: 760;
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 7px;
      color: var(--ink);
      background: var(--field);
      outline: none;
      font: inherit;
      font-size: 14px;
    }
    textarea {
      min-height: 126px;
      padding: 10px 11px;
      line-height: 1.5;
      resize: vertical;
    }
    input, select {
      height: 40px;
      padding: 0 10px;
    }
    select option { color: #111827; }
    .row {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 10px;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    button {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 7px;
      min-height: 42px;
      padding: 0 13px;
      color: #03201b;
      background: linear-gradient(180deg, #5af0d0, #29c5a5);
      font-weight: 820;
      cursor: pointer;
      box-shadow: 0 12px 34px rgba(23, 214, 179, .18);
    }
    button.secondary {
      color: #061429;
      background: linear-gradient(180deg, #9cc6ff, #64a0f7);
    }
    button.ghost {
      color: #f8fbff;
      background: rgba(255,255,255,.10);
    }
    .output {
      min-height: 460px;
      font-family: "Cascadia Mono", Consolas, "Microsoft YaHei", monospace;
      white-space: pre-wrap;
    }
    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .status {
      min-height: 20px;
      margin-top: 10px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 720;
    }
    code {
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 5px;
      padding: 2px 5px;
      color: #f6faff;
    }
    @media (max-width: 880px) {
      header, .layout, .row, .actions { grid-template-columns: 1fr; }
      .badge { width: fit-content; }
      .output { min-height: 340px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Ivy PPT Tool</h1>
        <p class="subtitle">普通网页版本：输入 PPT 模板风格和业务需求，一键生成图片样例 Prompt；样例图确认后，再生成可编辑 PPTX 复刻 Prompt。</p>
      </div>
      <div class="badge">不使用站长 API Key</div>
    </header>

    <section class="layout">
      <div class="panel strong">
        <h2>输入信息</h2>
        <label for="templateSummary">PPT 模板风格 / 版式说明</label>
        <textarea id="templateSummary" placeholder="例如：深蓝背景，绿色强调色，咨询风格，三栏卡片布局，标题大字，使用微软雅黑。也可以粘贴你对模板的观察。"></textarea>

        <label for="brief">PPT 需求提示词</label>
        <textarea id="brief" placeholder="例如：做一页 AI 销售增长方案，面向管理层，咨询汇报风格，突出获客、转化、复购三个模块。"></textarea>

        <div class="row">
          <div>
            <label for="pageCount">页数</label>
            <input id="pageCount" type="number" min="1" max="20" value="1" />
          </div>
          <div>
            <label for="sampleMode">样例模式</label>
            <select id="sampleMode">
              <option value="single">单页样例</option>
              <option value="multi">多页样例</option>
            </select>
          </div>
        </div>

        <label for="imageNotes">样例图确认后的补充说明</label>
        <textarea id="imageNotes" placeholder="例如：保留左侧大标题，右侧三张卡片，图标更扁平，整体更像原模板。"></textarea>

        <div class="actions">
          <button id="imagePromptBtn" type="button">生成图片样例 Prompt</button>
          <button id="replicaPromptBtn" type="button" class="secondary">生成 PPTX 复刻 Prompt</button>
          <button id="copyBtn" type="button" class="ghost">复制输出</button>
          <button id="clearBtn" type="button" class="ghost">清空</button>
        </div>
        <div id="status" class="status"></div>
        <p class="hint">生成图片 Prompt 后，可以复制到 ChatGPT / 生图工具里生成样例图。确认样例图后，再生成 PPTX 复刻 Prompt。</p>
      </div>

      <div class="panel">
        <h2>输出结果</h2>
        <textarea id="output" class="output" placeholder="这里会显示生成的 Prompt，可直接复制。"></textarea>
        <p class="hint">当前网页只做 prompt 组织，不调用任何模型 API，也不会消耗站长的 ChatGPT 或 OpenAI 额度。</p>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const status = $("status");
    const output = $("output");

    function setStatus(text) {
      status.textContent = text;
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        throw new Error(data.error || `请求失败：${res.status}`);
      }
      return data;
    }

    $("imagePromptBtn").addEventListener("click", async () => {
      setStatus("正在生成图片样例 Prompt...");
      try {
        const data = await postJson("/api/build-image-prompt", {
          brief: $("brief").value,
          templateSummary: $("templateSummary").value,
          pageCount: Number($("pageCount").value || 1),
          sampleMode: $("sampleMode").value,
        });
        output.value = data.imagePrompt;
        setStatus("图片样例 Prompt 已生成。");
      } catch (err) {
        setStatus(err.message);
      }
    });

    $("replicaPromptBtn").addEventListener("click", async () => {
      setStatus("正在生成 PPTX 复刻 Prompt...");
      try {
        const data = await postJson("/api/build-replication-prompt", {
          imageNotes: $("imageNotes").value,
        });
        output.value = data.replicationPrompt;
        setStatus("PPTX 复刻 Prompt 已生成。");
      } catch (err) {
        setStatus(err.message);
      }
    });

    $("copyBtn").addEventListener("click", async () => {
      if (!output.value.trim()) {
        setStatus("没有可复制的内容。");
        return;
      }
      await navigator.clipboard.writeText(output.value);
      setStatus("已复制到剪贴板。");
    });

    $("clearBtn").addEventListener("click", () => {
      output.value = "";
      setStatus("");
    });
  </script>
</body>
</html>
